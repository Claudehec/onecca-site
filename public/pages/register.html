<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ONECCA</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="/">ONECCA Cameroun</a>
        </div>
        <div class="nav-links">
            <a href="/pages/login.html">Connexion</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <div class="card-header">
                <h2>Inscription</h2>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Nom complet *</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="phone">
                </div>
                <div class="form-group">
                    <label>Mot de passe *</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe *</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">S'inscrire</button>
            </form>
            
            <p style="margin-top: 1rem; text-align: center;">
                Déjà inscrit ? <a href="/pages/login.html">Se connecter</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                document.getElementById('alertContainer').innerHTML = 
                    '<div class="alert alert-error">Les mots de passe ne correspondent pas</div>';
                return;
            }
            
            const userData = {
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password
            };
            
            try {
                await auth.register(userData);
                window.location.href = '/pages/user-dashboard.html';
            } catch (error) {
                document.getElementById('alertContainer').innerHTML = 
                    `<div class="alert alert-error">${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
